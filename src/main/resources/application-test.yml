spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: ${TEST_MYSQL_URL}
    username: ${TEST_MYSQL_USERNAME}
    password: ${TEST_MYSQL_PASSWORD}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      username: ${REDIS_USERNAME}
      password: ${REDIS_PASSWORD}

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            redirect-uri: ${KAKAO_REDIRECT_URI}
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope:
              - profile_nickname
              - openid

        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            jwk-set-uri: https://kauth.kakao.com/.well-known/jwks.json
            user-info-uri: https://kapi.kakao.com/v1/oidc/userinfo
  # multipart 최대 파일 크기 설정
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

management:
  endpoints:
    web:
      exposure:
        include: health, info

springdoc:
  swagger-ui:
    path: ${SWAGGER_UI_PATH}
  api-docs:
    path: ${SWAGGER_API_PATH}

aws:
  s3:
    bucket-name: ${AWS_S3_BUCKET_NAME}
  credentials:
    access-key: ${AWS_S3_ACCESS_KEY}
    secret-key: ${AWS_S3_SECRET_KEY}
  region: ${AWS_REGION}

# jwt 토큰 정보
jwt:
  auth-token-expired-second: ${AUTH_TOKEN_EXPIRED_SECOND}
  access-token-expired-second: ${ACCESS_TOKEN_EXPIRED_SECOND}
  refresh-token-expired-second: ${REFRESH_TOKEN_EXPIRED_SECOND}
  secret-key: ${JWT_SECRET_KEY}

# client 정보
client:
  url: ${CLIENT_URL}
  redirect:
    auth-success: ${CLIENT_REDIRECT_AUTH_SUCCESS_PATH}

# dev server 정보
server:
  url: ${DEV_SERVER_URL}

# 인증을 거치지 않는 API 설정
security:
  permitted-urls: ${SECURITY_PERMITTED_URLS}

# cloudfront
cloudfront:
  url: ${CLOUDFRONT_URL}